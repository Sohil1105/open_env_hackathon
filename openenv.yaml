# OpenEnv Specification for Financial Loan Underwriting & Risk Assessment
# This environment simulates a bank's loan underwriting desk where an AI agent
# evaluates applicant profiles and makes lending decisions.

name: "loan-underwriting-risk-assessment"
version: "1.0.0"
description: >
  A reinforcement learning environment that simulates a bank's loan underwriting desk.
  The agent receives applicant profiles containing financial and employment data, then must
  classify the applicant's risk level, make a loan approval decision, and recommend an
  appropriate interest rate tier. Grading uses partial credit scoring across all three
  decision components with logical consistency bonuses.

# Environment metadata
author:
  name: "Sohil1105"
  github: "https://github.com/Sohil1105/open_env_hackathon"
  hf_space: "https://huggingface.co/spaces/Sourav0511/open-env-hackathon"

license: "MIT"
tags:
  - finance
  - loan-underwriting
  - risk-assessment
  - reinforcement-learning
  - llm-agent
  - real-world
  - openenv

# Observation space definition — what the agent sees each step
observation_space:
  type: "structured"
  fields:
    - name: "applicant_name"
      type: "string"
      description: "Full name of the loan applicant"
    - name: "age"
      type: "integer"
      description: "Age of the applicant in years"
    - name: "annual_income"
      type: "float"
      description: "Applicant's annual income in USD"
    - name: "credit_score"
      type: "integer"
      description: "FICO credit score (300–850)"
    - name: "existing_debt"
      type: "float"
      description: "Total existing debt obligations in USD"
    - name: "employment_type"
      type: "string"
      enum: ["salaried", "self_employed", "freelancer", "contract", "unemployed"]
      description: "Type of employment"
    - name: "employment_years"
      type: "float"
      description: "Years of employment in current role"
    - name: "loan_amount_requested"
      type: "float"
      description: "Loan amount the applicant is requesting in USD"
    - name: "repayment_tenure_months"
      type: "integer"
      description: "Desired repayment period in months"
    - name: "monthly_expenses"
      type: "float"
      description: "Average monthly expenses in USD"
    - name: "has_collateral"
      type: "boolean"
      description: "Whether the applicant has collateral to offer"
    - name: "previous_defaults"
      type: "integer"
      description: "Number of previous loan defaults"
    - name: "task_description"
      type: "string"
      description: "Description of what the agent must decide for this task"

# Action space definition — what the agent can output
action_space:
  type: "structured"
  fields:
    - name: "risk_level"
      type: "string"
      enum: ["Low", "Medium", "High"]
      description: "Classified risk level of the applicant"
    - name: "loan_decision"
      type: "string"
      enum: ["Approve", "Conditional Approve", "Reject"]
      description: "Loan approval decision"
    - name: "interest_rate_tier"
      type: "string"
      enum: ["7-9%", "10-13%", "14%+"]
      description: "Recommended interest rate tier"
    - name: "reasoning"
      type: "string"
      description: "Brief explanation for the underwriting decision"

# Task definitions with progressive difficulty
tasks:
  - id: "easy_salaried_high_credit"
    name: "Simple Salaried Profile Assessment"
    difficulty: "easy"
    description: >
      Evaluate a straightforward applicant: salaried employee with a high credit score
      (750+), low debt-to-income ratio, and stable employment history. The agent primarily
      needs to classify the risk level correctly. Loan decision and interest rate are
      simpler given the strong profile.
    example_input:
      income: 75000
      credit_score: 780
      debt: 10000
      loan_amount: 150000
      employment: "salaried"
    example_output:
      risk_level: "Low"
      loan_decision: "Approve"
      interest_rate_tier: "7-9%"
    scoring:
      risk_level_weight: 0.4
      loan_decision_weight: 0.35
      interest_rate_weight: 0.25
      consistency_bonus: 0.1

  - id: "medium_self_employed_moderate"
    name: "Self-Employed Moderate Profile"
    difficulty: "medium"
    description: >
      Evaluate a moderately complex applicant: self-employed individual with an average
      credit score (620–700), moderate existing debt, and variable income stability.
      The agent must classify risk level AND make the correct loan approval decision.
      Requires balancing multiple competing signals.
    example_input:
      income: 45000
      credit_score: 650
      debt: 20000
      loan_amount: 200000
      employment: "self-employed"
    example_output:
      risk_level: "Medium"
      loan_decision: "Conditional Approve"
      interest_rate_tier: "10-13%"
    scoring:
      risk_level_weight: 0.4
      loan_decision_weight: 0.35
      interest_rate_weight: 0.25
      consistency_bonus: 0.1

  - id: "hard_freelancer_complex"
    name: "Complex Freelancer High-Risk Profile"
    difficulty: "hard"
    description: >
      Evaluate a complex applicant: freelancer with irregular income, low credit score
      (550–600), high existing debt, and a large loan request. The agent must correctly
      classify risk level, make the approval decision, AND recommend the right interest
      rate tier. All three decisions must align logically with each other.
    example_input:
      income: 30000
      credit_score: 570
      debt: 35000
      loan_amount: 250000
      employment: "freelancer"
    example_output:
      risk_level: "High"
      loan_decision: "Reject"
      interest_rate_tier: "14%+"
    scoring:
      risk_level_weight: 0.4
      loan_decision_weight: 0.35
      interest_rate_weight: 0.25
      consistency_bonus: 0.1

  - id: "bankruptcy_recovery_edge1"
    name: "Bankruptcy Recovery Edge Case"
    difficulty: "medium"
    description: >
      Evaluate a loan application from an individual who declared bankruptcy 7 years ago.
      They have since rebuilt their credit score to 680 with stable income and low debt.
      Tests the agent's ability to handle nuanced historical financial events and weigh
      recovery signals appropriately.
    example_input:
      income: 65000
      credit_score: 680
      debt: 8000
      loan_amount: 120000
      history: "bankruptcy_7_years_ago"
    example_output:
      risk_level: "Medium"
      loan_decision: "Conditional Approve"
      interest_rate_tier: "10-13%"
    scoring:
      risk_level_weight: 0.4
      loan_decision_weight: 0.35
      interest_rate_weight: 0.25
      consistency_bonus: 0.1

  - id: "joint_applicants_edge2"
    name: "Joint Applicants Edge Case"
    difficulty: "easy"
    description: >
      Evaluate a joint loan application from two applicants with combined strong
      financials. Tests the agent's ability to handle multi-applicant scenarios,
      combining income and credit profiles to make a unified underwriting decision.
    example_input:
      combined_income: 120000
      primary_credit_score: 720
      secondary_credit_score: 690
      combined_debt: 25000
      loan_amount: 300000
    example_output:
      risk_level: "Low"
      loan_decision: "Approve"
      interest_rate_tier: "7-9%"
    scoring:
      risk_level_weight: 0.4
      loan_decision_weight: 0.35
      interest_rate_weight: 0.25
      consistency_bonus: 0.1

  - id: "lead_qualification_sales"
    name: "Lead Qualification Assessment"
    difficulty: "easy"
    description: >
      Perform initial lead qualification on a potential loan applicant. Determine
      whether the lead is worthy of a full loan application based on income level,
      employment stability, credit score, and overall financial profile. Tests the
      agent's ability to quickly triage applicants at the sales stage.
    example_input:
      income: 950000
      credit_score: 760
      debt: 80000
      loan_amount: 350000
      employment: "salaried"
    example_output:
      risk_level: "Low"
      loan_decision: "Approve"
      interest_rate_tier: "7-9%"
    scoring:
      risk_level_weight: 0.35
      loan_decision_weight: 0.45
      interest_rate_weight: 0.20
      consistency_bonus: 0.1

  - id: "document_verification_hr"
    name: "Document Verification Assessment"
    difficulty: "medium"
    description: >
      Perform document verification for a loan application. Assess whether submitted
      documents are complete, consistent, and sufficient for processing. Self-employed
      applicants with short tenure and previous defaults require enhanced scrutiny.
      Tests the agent's ability to identify documentation gaps and inconsistencies.
    example_input:
      income: 580000
      credit_score: 640
      debt: 220000
      loan_amount: 450000
      employment: "self_employed"
      previous_defaults: 1
    example_output:
      risk_level: "Medium"
      loan_decision: "Conditional Approve"
      interest_rate_tier: "10-13%"
    scoring:
      risk_level_weight: 0.45
      loan_decision_weight: 0.35
      interest_rate_weight: 0.20
      consistency_bonus: 0.1

  - id: "customer_onboarding_pm"
    name: "Customer Onboarding Assessment"
    difficulty: "easy"
    description: >
      Handle the onboarding of an approved loan customer. Assess completeness of
      onboarding steps including KYC verification, agreement signing, account setup,
      insurance linkage, and EMI mandate registration. Tests the agent's ability to
      evaluate process completeness and readiness for loan disbursement.
    example_input:
      income: 1050000
      credit_score: 745
      debt: 120000
      loan_amount: 600000
      employment: "salaried"
    example_output:
      risk_level: "Low"
      loan_decision: "Approve"
      interest_rate_tier: "7-9%"
    scoring:
      risk_level_weight: 0.35
      loan_decision_weight: 0.35
      interest_rate_weight: 0.20
      consistency_bonus: 0.1

# Reward structure
reward:
  type: "partial_credit"
  range: [0.0, 1.0]
  components:
    - name: "risk_classification"
      weight: 0.4
      description: "Accuracy of risk level classification"
    - name: "loan_decision"
      weight: 0.35
      description: "Correctness of loan approval decision"
    - name: "interest_rate"
      weight: 0.25
      description: "Appropriateness of interest rate tier recommendation"
    - name: "consistency_bonus"
      weight: 0.1
      description: "Bonus for logical consistency across all three decisions"

# Runtime constraints
runtime:
  max_episode_steps: 1
  max_episodes_per_task: 1
  timeout_seconds: 1200