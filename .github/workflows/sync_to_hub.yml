# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Sync to Hugging Face Spaces
# Triggers on every push to main, force-pushes code to HF Space repo
# Uses direct git push — most reliable method, no third-party action needed
# ─────────────────────────────────────────────────────────────────────────────
name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

# Only allow one sync at a time to prevent race conditions
concurrency:
  group: hf-space-sync
  cancel-in-progress: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out full git history with LFS support
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Step 2: Install git-lfs for large file handling
      - name: Install git-lfs
        run: git lfs install

      # Step 3: Prepare clean push (Orphan branch to strip history)
      - name: Prepare and Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 1. Create a new orphan branch (no history)
          git checkout --orphan hf-sync
          
          # 2. Remove binary files that HF rejects
          find . -name "*.png" -delete
          git add .
          
          # 3. Create a single "clean" commit
          git commit -m "Sync to Space: $(date)"
          
          # 4. Force push this single commit to HF main
          git remote add hf https://Sourav0511:$HF_TOKEN@huggingface.co/spaces/Sourav0511/open-env-hackathon || true
          git push hf hf-sync:main --force
